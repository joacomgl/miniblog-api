openapi: 3.0.0

info:
  title: MiniBlog API
  version: 1.0.0
  description: API REST para gestión de autores y posts de MiniBlog

servers:
  - url: http://localhost:3000

paths:

  /authors:
    get:
      summary: Obtener todos los autores
      description: Devuelve una lista de autores
      responses:
        '200':
          description: Lista de autores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Author'

        '500':
          description: Error interno del servidor

    post:
      summary: Crear autor
      description: Crea un nuevo autor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
              properties:
                name:
                  type: string
                email:
                  type: string
                bio:
                  type: string

      responses:
        '201':
          description: Autor creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'

        '400':
          description: Datos inválidos o email duplicado

        '500':
          description: Error interno del servidor

  /authors/{id}:
    get:
      summary: Obtener autor por ID
      description: Devuelve un autor específico
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      responses:
        '200':
          description: Autor encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'

        '404':
          description: Autor no encontrado

        '500':
          description: Error interno del servidor

    put:
      summary: Actualizar autor
      description: Actualiza un autor existente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
              properties:
                name:
                  type: string
                email:
                  type: string
                bio:
                  type: string

      responses:
        '200':
          description: Autor actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'

        '400':
          description: Datos inválidos

        '404':
          description: Autor no encontrado

        '500':
          description: Error interno del servidor

    delete:
      summary: Eliminar autor
      description: Elimina un autor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      responses:
        '204':
          description: Autor eliminado

        '404':
          description: Autor no encontrado

        '500':
          description: Error interno del servidor

  /posts:
    get:
      summary: Obtener todos los posts
      description: Devuelve una lista de posts
      responses:
        '200':
          description: Lista de posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'

        '500':
          description: Error interno del servidor

    post:
      summary: Crear post
      description: Crea un nuevo post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - author_id
                - title
                - content
              properties:
                author_id:
                  type: integer
                title:
                  type: string
                content:
                  type: string
                published:
                  type: boolean

      responses:
        '201':
          description: Post creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'

        '400':
          description: Datos inválidos

        '500':
          description: Error interno del servidor

  /posts/{id}:
    get:
      summary: Obtener post por ID
      description: Devuelve un post específico
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      responses:
        '200':
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'

        '404':
          description: Post no encontrado

        '500':
          description: Error interno del servidor

    put:
      summary: Actualizar post
      description: Actualiza un post existente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - author_id
                - title
                - content
              properties:
                author_id:
                  type: integer
                title:
                  type: string
                content:
                  type: string
                published:
                  type: boolean

      responses:
        '200':
          description: Post actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'

        '400':
          description: Datos inválidos

        '404':
          description: Post no encontrado

        '500':
          description: Error interno del servidor

    delete:
      summary: Eliminar post
      description: Elimina un post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      responses:
        '204':
          description: Post eliminado

        '404':
          description: Post no encontrado

        '500':
          description: Error interno del servidor

  /posts/author/{authorId}:
    get:
      summary: Obtener posts por autor
      description: Devuelve todos los posts de un autor
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: integer

      responses:
        '200':
          description: Lista de posts del autor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'

        '404':
          description: Autor no encontrado

        '500':
          description: Error interno del servidor

components:
  schemas:

    Author:
      type: object
      properties:
        id:
          type: integer

        name:
          type: string

        email:
          type: string

        bio:
          type: string

        created_at:
          type: string
          format: date-time

    Post:
      type: object
      properties:
        id:
          type: integer

        author_id:
          type: integer

        title:
          type: string

        content:
          type: string

        published:
          type: boolean

        created_at:
          type: string
          format: date-time